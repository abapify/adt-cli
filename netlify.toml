# Netlify build config for the Docusaurus site under website/.
#
# The site is self-contained: website/ has its own package.json and build script
# (`docusaurus build`), so Netlify only needs to install deps and build inside
# that directory.
#
# NOTE: Netlify's public build runners resolve dependencies from the public npm
# registry. If you are deploying from a network that requires a private mirror,
# set BUN_CONFIG_REGISTRY as a build environment variable in the Netlify UI —
# do not hardcode registry URLs here.

[build]
  base = "website"
  command = "bun install && bun run build"
  publish = "build"
  # Skip the deploy entirely when nothing under `website/` or this file
  # changed since the last successful build. Without this, Netlify runs
  # the full build and only at the end decides "no content change" —
  # which gets reported as a red `error` state + failing GitHub commit
  # status. Exit 0 from this command tells Netlify to skip the deploy
  # (reported as `skipped`, not `error`). Exit 1 means "proceed".
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ../netlify.toml"

[build.environment]
  NODE_VERSION = "20"
  NX_DAEMON = "false"
