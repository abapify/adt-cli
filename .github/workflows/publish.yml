name: Publish

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: 'Release version tag to publish (e.g. v1.2.3), defaults to the ref that triggered the workflow'
        required: false
        type: string

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # needed for provenance data generation
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Override @abapify scope registry for npmjs publishing
        # The repo-level .npmrc pins @abapify:registry to GitHub Packages so
        # consumers can install @abapify/* from GHP. During the npm publish job
        # we instead target registry.npmjs.org (OIDC trusted publisher), so the
        # scope override must be dropped before `nx release publish` runs —
        # otherwise npm issues metadata GETs against GHP and fails with 401.
        run: |
          sed -i '/^@abapify:registry=/d' .npmrc
          echo "--- effective .npmrc ---"
          cat .npmrc

      - name: Upgrade npm to >= 11.10
        # Node 24 ships with npm 11.0.x. OIDC trusted publishing discovery
        # (no NPM_TOKEN, picks up the GitHub Actions id-token automatically)
        # landed in npm 11.5.1 and got stable in 11.10. Without this bump
        # publishes against npmjs return `Not Found - PUT /<pkg>` because
        # npm never attempts the OIDC flow.
        run: |
          npm install -g npm@^11.10.0
          npm --version

      - name: Clean setup-node .npmrc for OIDC
        # actions/setup-node with `registry-url` writes
        #   always-auth=true
        #   //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
        # Since we don't pass a `token` to setup-node, NODE_AUTH_TOKEN is
        # effectively empty, so npm ends up sending an empty Authorization
        # header on PUT and npmjs responds `Not Found`. To make OIDC
        # trusted publishing kick in, the registry entry must be present
        # without any token line — npm then asks GitHub Actions for an
        # id-token and exchanges it for a publish token.
        run: |
          cat > "$NPM_CONFIG_USERCONFIG" <<'EOF'
          registry=https://registry.npmjs.org/
          EOF
          echo "--- effective userconfig ($NPM_CONFIG_USERCONFIG) ---"
          cat "$NPM_CONFIG_USERCONFIG"

      - name: Force npm as nx release publish driver (for this job only)
        # nx.json keeps `cli.packageManager: bun` globally — bun is the
        # monorepo's workspace package manager, handles `workspace:*`
        # dependency protocol etc. But Nx 22's @nx/js:release-publish
        # honours that setting and invokes `bun publish`, which does NOT
        # support OIDC trusted publishing and errors with `missing
        # authentication`. Switching nx.json permanently breaks
        # `nx release version` (npm can't resolve `workspace:*`), so we
        # flip it to npm in this job only and leave the committed file
        # alone.
        run: |
          node -e "
            const fs = require('node:fs');
            const p = 'nx.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.cli = { ...(j.cli ?? {}), packageManager: 'npm' };
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          grep -A1 '\"cli\"' nx.json

      - name: Publish packages
        run: npx nx release publish
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_ACCESS: public
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
