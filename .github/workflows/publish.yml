name: Publish

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: 'Release version tag to publish (e.g. v1.2.3), defaults to the ref that triggered the workflow'
        required: false
        type: string

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # needed for provenance data generation
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Override @abapify scope registry for npmjs publishing
        # The repo-level .npmrc pins @abapify:registry to GitHub Packages so
        # consumers can install @abapify/* from GHP. During the npm publish job
        # we instead target registry.npmjs.org (OIDC trusted publisher), so the
        # scope override must be dropped before `nx release publish` runs —
        # otherwise npm issues metadata GETs against GHP and fails with 401.
        run: |
          sed -i '/^@abapify:registry=/d' .npmrc
          echo "--- effective .npmrc ---"
          cat .npmrc

      - name: Force npm as nx release publish driver
        # The monorepo uses bun as its workspace package manager
        # (`cli.packageManager=bun` in nx.json). Nx 22's
        # `@nx/js:release-publish` honours that and invokes `bun publish`,
        # which does NOT support OIDC trusted publishing — it just errors
        # with `missing authentication`. Override the nx-level package
        # manager to npm in this job only, so `nx release publish` runs
        # `npm publish` and the GitHub Actions OIDC token is consumed.
        run: |
          node -e "
            const fs = require('node:fs');
            const p = 'nx.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.cli = { ...(j.cli ?? {}), packageManager: 'npm' };
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          grep -A1 '\"cli\"' nx.json

      - name: Publish packages
        run: npx nx release publish
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_ACCESS: public
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
